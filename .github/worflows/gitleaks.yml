name: Gitleaks Scan

on:
    pull_request:
    push:
        branches: [main]

jobs:
    scan:
        name: gitleaks
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Gitleaks
              uses: gitleaks/gitleaks-action@v2.3.9
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
